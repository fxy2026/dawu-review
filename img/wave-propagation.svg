<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif">
  <rect width="600" height="300" fill="#fffef9"/>

  <!-- Title -->
  <text x="300" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a5276">波动方程示意图</text>

  <!-- Formula -->
  <text x="300" y="48" text-anchor="middle" font-size="13" fill="#1a5276" font-style="italic">y = A cos(kx − ωt)</text>

  <g transform="translate(40,170)">
    <!-- Axes -->
    <line x1="0" y1="0" x2="530" y2="0" stroke="#999" stroke-width="0.8"/>
    <line x1="0" y1="-100" x2="0" y2="100" stroke="#999" stroke-width="0.8"/>
    <text x="530" y="16" font-size="11" fill="#666">x</text>
    <text x="6" y="-90" font-size="11" fill="#666">y</text>

    <!-- Amplitude labels -->
    <line x1="-5" y1="-65" x2="5" y2="-65" stroke="#666" stroke-width="0.8"/>
    <text x="-18" y="-61" font-size="11" fill="#1a5276" font-weight="bold">A</text>
    <line x1="-5" y1="65" x2="5" y2="65" stroke="#666" stroke-width="0.8"/>
    <text x="-24" y="69" font-size="11" fill="#1a5276" font-weight="bold">−A</text>

    <!-- Solid wave: snapshot at t=0 -->
    <path d="M 0,0 Q 32.5,-65 65,-65 Q 97.5,-65 130,0 Q 162.5,65 195,65 Q 227.5,65 260,0 Q 292.5,-65 325,-65 Q 357.5,-65 390,0 Q 422.5,65 455,65 Q 487.5,65 520,0"
      fill="none" stroke="#1a5276" stroke-width="2.5"/>

    <!-- Dashed wave: snapshot at t=Δt (shifted right ~30px) -->
    <path d="M 30,0 Q 62.5,-65 95,-65 Q 127.5,-65 160,0 Q 192.5,65 225,65 Q 257.5,65 290,0 Q 322.5,-65 355,-65 Q 387.5,-65 420,0 Q 452.5,65 485,65 Q 510,65 520,40"
      fill="none" stroke="#c0392b" stroke-width="1.8" stroke-dasharray="8,5" opacity="0.7"/>

    <!-- Propagation arrow -->
    <line x1="200" y1="-90" x2="260" y2="-90" stroke="#c0392b" stroke-width="2.5" marker-end="url(#arrowRedBig)"/>
    <text x="230" y="-96" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">传播方向 v</text>

    <!-- Wavelength λ bracket (one full period) -->
    <line x1="65" y1="80" x2="65" y2="88" stroke="#27ae60" stroke-width="1"/>
    <line x1="325" y1="80" x2="325" y2="88" stroke="#27ae60" stroke-width="1"/>
    <line x1="65" y1="85" x2="325" y2="85" stroke="#27ae60" stroke-width="1.8" marker-start="url(#arrowGreenL)" marker-end="url(#arrowGreen)"/>
    <text x="195" y="102" text-anchor="middle" font-size="13" fill="#27ae60" font-weight="bold">λ (波长)</text>

    <!-- Amplitude bracket on right side -->
    <line x1="460" y1="0" x2="470" y2="0" stroke="#8e44ad" stroke-width="0.8"/>
    <line x1="460" y1="-65" x2="470" y2="-65" stroke="#8e44ad" stroke-width="0.8"/>
    <line x1="465" y1="0" x2="465" y2="-65" stroke="#8e44ad" stroke-width="1.5" marker-start="url(#arrowPurpleD)" marker-end="url(#arrowPurpleU)"/>
    <text x="480" y="-30" font-size="12" fill="#8e44ad" font-weight="bold">A</text>

    <!-- Shift arrow Δx between the two curves -->
    <line x1="65" y1="-70" x2="95" y2="-70" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <text x="80" y="-75" text-anchor="middle" font-size="9" fill="#e67e22">Δx = vΔt</text>
  </g>

  <!-- Legend -->
  <g transform="translate(350,280)">
    <line x1="0" y1="0" x2="25" y2="0" stroke="#1a5276" stroke-width="2.5"/>
    <text x="30" y="4" font-size="10" fill="#333">t 时刻</text>
    <line x1="100" y1="0" x2="125" y2="0" stroke="#c0392b" stroke-width="1.8" stroke-dasharray="8,5" opacity="0.7"/>
    <text x="130" y="4" font-size="10" fill="#333">t + Δt 时刻</text>
  </g>

  <defs>
    <marker id="arrowRedBig" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#c0392b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#27ae60"/>
    </marker>
    <marker id="arrowGreenL" markerWidth="6" markerHeight="4" refX="0" refY="2" orient="auto">
      <path d="M6,0 L0,2 L6,4" fill="#27ae60"/>
    </marker>
    <marker id="arrowPurpleU" markerWidth="4" markerHeight="6" refX="2" refY="0" orient="auto">
      <path d="M0,6 L2,0 L4,6" fill="#8e44ad"/>
    </marker>
    <marker id="arrowPurpleD" markerWidth="4" markerHeight="6" refX="2" refY="6" orient="auto">
      <path d="M0,0 L2,6 L4,0" fill="#8e44ad"/>
    </marker>
    <marker id="arrowOrange" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#e67e22"/>
    </marker>
  </defs>
</svg>