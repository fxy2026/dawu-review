<svg xmlns="http://www.w3.org/2000/svg" width="500" height="450" viewBox="0 0 500 450">
  <defs>
    <marker id="sArrBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a5276"/>
    </marker>
    <marker id="sArrRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
    </marker>
    <marker id="sArrOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#1a5276">时空图 — 同时性的相对性</text>

  <!-- Origin at (120, 380) -->
  <!-- ct axis: vertical up; x axis: horizontal right -->

  <!-- Light cone (45° dashed lines) -->
  <line x1="120" y1="380" x2="380" y2="120" stroke="#aaa" stroke-width="1.5" stroke-dasharray="8,4"/>
  <line x1="120" y1="380" x2="20" y2="280" stroke="#aaa" stroke-width="1.5" stroke-dasharray="8,4"/>
  <!-- Light cone upper extension -->
  <text x="375" y="110" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="11" fill="#aaa">光锥</text>
  <text x="385" y="125" font-family="serif" font-size="11" fill="#aaa">x = ct</text>
  <text x="10" y="275" font-family="serif" font-size="11" fill="#aaa">x = −ct</text>

  <!-- S frame axes -->
  <!-- x-axis -->
  <line x1="40" y1="380" x2="470" y2="380" stroke="#1a5276" stroke-width="2.5" marker-end="url(#sArrBlue)"/>
  <text x="465" y="400" font-family="serif" font-size="16" font-weight="bold" font-style="italic" fill="#1a5276">x</text>

  <!-- ct-axis -->
  <line x1="120" y1="420" x2="120" y2="45" stroke="#1a5276" stroke-width="2.5" marker-end="url(#sArrBlue)"/>
  <text x="100" y="55" font-family="serif" font-size="16" font-weight="bold" font-style="italic" fill="#1a5276">ct</text>

  <!-- Origin label -->
  <text x="105" y="400" font-family="serif" font-size="14" font-weight="bold" fill="#1a5276">O</text>

  <!-- S' frame axes (tilted) -->
  <!-- v/c = β ≈ 0.4, so tilt angle ≈ arctan(0.4) ≈ 21.8° -->
  <!-- ct' axis: tilts right from ct by ~22° => direction (sin22, -cos22) = (0.374, -0.927) -->
  <!-- x' axis: tilts up from x by ~22° => direction (cos22, -sin22) = (0.927, -0.374) -->

  <!-- ct' axis -->
  <line x1="120" y1="380" x2="240" y2="82" stroke="#c0392b" stroke-width="2.2" marker-end="url(#sArrRed)"/>
  <text x="245" y="78" font-family="serif" font-size="16" font-weight="bold" font-style="italic" fill="#c0392b">ct'</text>

  <!-- x' axis -->
  <line x1="120" y1="380" x2="445" y2="250" stroke="#c0392b" stroke-width="2.2" marker-end="url(#sArrRed)"/>
  <text x="440" y="242" font-family="serif" font-size="16" font-weight="bold" font-style="italic" fill="#c0392b">x'</text>

  <!-- S frame label -->
  <text x="430" y="375" font-family="serif" font-size="15" font-weight="bold" fill="#1a5276">S</text>
  <!-- S' frame label -->
  <text x="415" y="260" font-family="serif" font-size="15" font-weight="bold" fill="#c0392b">S'</text>

  <!-- Two events A and B, simultaneous in S (same ct, different x) -->
  <!-- ct = 200 pixels up from origin => y = 380-200 = 180 -->
  <!-- Event A at x=100 (pixel 220), Event B at x=220 (pixel 340) -->

  <!-- Horizontal line showing simultaneity in S -->
  <line x1="200" y1="230" x2="370" y2="230" stroke="#1a5276" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Event A -->
  <circle cx="220" cy="230" r="6" fill="#e67e22"/>
  <text x="210" y="218" font-family="serif" font-size="15" font-weight="bold" fill="#e67e22">A</text>

  <!-- Event B -->
  <circle cx="350" cy="230" r="6" fill="#e67e22"/>
  <text x="340" y="218" font-family="serif" font-size="15" font-weight="bold" fill="#e67e22">B</text>

  <!-- Label: simultaneous in S -->
  <text x="235" y="255" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#1a5276">S系中同时</text>

  <!-- Project events onto ct' axis via lines parallel to x' axis -->
  <!-- x' direction from origin: slope = -0.374/0.927 ≈ -0.403 -->
  <!-- Line through A parallel to x': y - 230 = -0.403 * (x - 220) -->
  <!-- Intersect with ct' axis (line from origin with slope -0.927/0.374 = -2.478): -->
  <!-- y - 380 = -2.478 * (x - 120) -->
  <!-- For A: 230 - 0.403*(x-220) = 380 - 2.478*(x-120) -->
  <!-- 230 - 0.403x + 88.66 = 380 - 2.478x + 297.36 -->
  <!-- 318.66 - 0.403x = 677.36 - 2.478x -->
  <!-- 2.075x = 358.7 => x ≈ 172.9, y ≈ 380 - 2.478*52.9 ≈ 380-131.1 ≈ 248.9 -->
  <!-- For B: 230 - 0.403*(x-350) = 380 - 2.478*(x-120) -->
  <!-- 230 - 0.403x + 141.05 = 380 - 2.478x + 297.36 -->
  <!-- 371.05 - 0.403x = 677.36 - 2.478x -->
  <!-- 2.075x = 306.31 => x ≈ 147.6, y ≈ 380 - 2.478*27.6 ≈ 380-68.4 ≈ 311.6 -->

  <!-- Projection lines (parallel to x') from A and B to ct' axis -->
  <line x1="220" y1="230" x2="173" y2="249" stroke="#e67e22" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="350" y1="230" x2="148" y2="312" stroke="#e67e22" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Marks on ct' axis showing different ct' values -->
  <circle cx="173" cy="249" r="4" fill="#c0392b"/>
  <text x="155" y="242" font-family="serif" font-size="12" font-weight="bold" fill="#c0392b">t'<tspan font-size="9" dy="2">A</tspan></text>

  <circle cx="148" cy="312" r="4" fill="#c0392b"/>
  <text x="128" y="308" font-family="serif" font-size="12" font-weight="bold" fill="#c0392b">t'<tspan font-size="9" dy="2">B</tspan></text>

  <!-- Bracket showing different ct' values -->
  <line x1="140" y1="255" x2="140" y2="305" stroke="#c0392b" stroke-width="2"/>
  <line x1="137" y1="255" x2="143" y2="255" stroke="#c0392b" stroke-width="2"/>
  <line x1="137" y1="305" x2="143" y2="305" stroke="#c0392b" stroke-width="2"/>
  <text x="50" y="283" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#c0392b">t'A ≠ t'B</text>

  <!-- Label: NOT simultaneous in S' -->
  <text x="25" y="300" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#c0392b">S'系中不同时</text>

  <!-- Velocity label -->
  <rect x="320" y="50" width="160" height="45" rx="6" fill="#f4f6f7" stroke="#ccc" stroke-width="1"/>
  <text x="330" y="70" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#555">S'相对S以速度v运动</text>
  <text x="330" y="88" font-family="serif" font-size="12" fill="#555">tanα = v/c = β</text>
</svg>