<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 400" width="650" height="400" font-family="'SimSun','SimHei','Microsoft YaHei',serif">
  <rect width="650" height="400" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="325" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a5276">常见刚体的转动惯量</text>

  <!-- Grid: 3 columns × 2 rows -->
  <!-- Column centers: 115, 325, 535 -->
  <!-- Row centers: 130, 300 -->

  <!-- ============ Row 1 ============ -->

  <!-- 1. Thin rod, axis through center -->
  <rect x="20" y="50" width="190" height="155" fill="white" stroke="#ddd" rx="6"/>
  <text x="115" y="72" text-anchor="middle" font-size="11" fill="#1a5276" font-weight="bold">细杆 (中心轴)</text>
  <!-- Rod -->
  <line x1="50" y1="125" x2="180" y2="125" stroke="#1a5276" stroke-width="4" stroke-linecap="round"/>
  <!-- Axis through center (vertical dashed) -->
  <line x1="115" y1="90" x2="115" y2="160" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- L label -->
  <line x1="50" y1="140" x2="180" y2="140" stroke="#555" stroke-width="0.8"/>
  <line x1="50" y1="137" x2="50" y2="143" stroke="#555" stroke-width="0.8"/>
  <line x1="180" y1="137" x2="180" y2="143" stroke="#555" stroke-width="0.8"/>
  <text x="115" y="152" text-anchor="middle" font-size="10" fill="#555" font-style="italic">L</text>
  <!-- Formula -->
  <text x="115" y="192" text-anchor="middle" font-size="13" fill="#27ae60" font-weight="bold">J = ML²/12</text>

  <!-- 2. Thin rod, axis through end -->
  <rect x="230" y="50" width="190" height="155" fill="white" stroke="#ddd" rx="6"/>
  <text x="325" y="72" text-anchor="middle" font-size="11" fill="#1a5276" font-weight="bold">细杆 (端点轴)</text>
  <!-- Rod -->
  <line x1="260" y1="125" x2="390" y2="125" stroke="#1a5276" stroke-width="4" stroke-linecap="round"/>
  <!-- Axis through left end (vertical dashed) -->
  <line x1="260" y1="90" x2="260" y2="160" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- L label -->
  <line x1="260" y1="140" x2="390" y2="140" stroke="#555" stroke-width="0.8"/>
  <line x1="260" y1="137" x2="260" y2="143" stroke="#555" stroke-width="0.8"/>
  <line x1="390" y1="137" x2="390" y2="143" stroke="#555" stroke-width="0.8"/>
  <text x="325" y="152" text-anchor="middle" font-size="10" fill="#555" font-style="italic">L</text>
  <!-- Formula -->
  <text x="325" y="192" text-anchor="middle" font-size="13" fill="#27ae60" font-weight="bold">J = ML²/3</text>

  <!-- 3. Ring / thin hoop -->
  <rect x="440" y="50" width="190" height="155" fill="white" stroke="#ddd" rx="6"/>
  <text x="535" y="72" text-anchor="middle" font-size="11" fill="#1a5276" font-weight="bold">细圆环 (中心轴)</text>
  <!-- Ring -->
  <circle cx="535" cy="122" r="30" fill="none" stroke="#1a5276" stroke-width="3"/>
  <!-- Axis (dot at center coming out of plane) -->
  <circle cx="535" cy="122" r="3" fill="#c0392b"/>
  <line x1="535" y1="85" x2="535" y2="160" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- R label -->
  <line x1="535" y1="122" x2="565" y2="122" stroke="#555" stroke-width="0.8"/>
  <text x="553" y="118" font-size="10" fill="#555" font-style="italic">R</text>
  <!-- Formula -->
  <text x="535" y="192" text-anchor="middle" font-size="13" fill="#27ae60" font-weight="bold">J = MR²</text>

  <!-- ============ Row 2 ============ -->

  <!-- 4. Disk, axis through center -->
  <rect x="20" y="220" width="190" height="155" fill="white" stroke="#ddd" rx="6"/>
  <text x="115" y="242" text-anchor="middle" font-size="11" fill="#1a5276" font-weight="bold">均匀圆盘 (中心轴)</text>
  <!-- Disk (filled ellipse for 3D feel) -->
  <ellipse cx="115" cy="295" rx="45" ry="18" fill="#1a5276" opacity="0.15" stroke="#1a5276" stroke-width="2"/>
  <!-- Axis -->
  <line x1="115" y1="260" x2="115" y2="330" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="115" cy="295" r="3" fill="#c0392b"/>
  <!-- R label -->
  <line x1="115" y1="295" x2="160" y2="295" stroke="#555" stroke-width="0.8"/>
  <text x="140" y="291" font-size="10" fill="#555" font-style="italic">R</text>
  <!-- Formula -->
  <text x="115" y="365" text-anchor="middle" font-size="13" fill="#27ae60" font-weight="bold">J = MR²/2</text>

  <!-- 5. Solid sphere -->
  <rect x="230" y="220" width="190" height="155" fill="white" stroke="#ddd" rx="6"/>
  <text x="325" y="242" text-anchor="middle" font-size="11" fill="#1a5276" font-weight="bold">均匀实心球</text>
  <!-- Sphere -->
  <circle cx="325" cy="295" r="32" fill="#1a5276" opacity="0.12" stroke="#1a5276" stroke-width="2"/>
  <!-- Axis (vertical dashed through center) -->
  <line x1="325" y1="255" x2="325" y2="335" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="325" cy="295" r="3" fill="#c0392b"/>
  <!-- R label -->
  <line x1="325" y1="295" x2="357" y2="295" stroke="#555" stroke-width="0.8"/>
  <text x="343" y="291" font-size="10" fill="#555" font-style="italic">R</text>
  <!-- Formula -->
  <text x="325" y="365" text-anchor="middle" font-size="13" fill="#27ae60" font-weight="bold">J = 2MR²/5</text>

  <!-- 6. Spherical shell -->
  <rect x="440" y="220" width="190" height="155" fill="white" stroke="#ddd" rx="6"/>
  <text x="535" y="242" text-anchor="middle" font-size="11" fill="#1a5276" font-weight="bold">均匀球壳</text>
  <!-- Spherical shell (circle, no fill) -->
  <circle cx="535" cy="295" r="32" fill="none" stroke="#1a5276" stroke-width="3"/>
  <!-- Inner dashed circle to show it's hollow -->
  <circle cx="535" cy="295" r="26" fill="none" stroke="#1a5276" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <!-- Axis -->
  <line x1="535" y1="255" x2="535" y2="335" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="535" cy="295" r="3" fill="#c0392b"/>
  <!-- R label -->
  <line x1="535" y1="295" x2="567" y2="295" stroke="#555" stroke-width="0.8"/>
  <text x="553" y="291" font-size="10" fill="#555" font-style="italic">R</text>
  <!-- Formula -->
  <text x="535" y="365" text-anchor="middle" font-size="13" fill="#27ae60" font-weight="bold">J = 2MR²/3</text>
</svg>