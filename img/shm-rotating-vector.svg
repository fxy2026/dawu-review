<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif">
  <rect width="600" height="300" fill="#fffef9"/>

  <!-- Title -->
  <text x="300" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a5276">旋转矢量法示意图</text>

  <!-- === Left: Unit Circle === -->
  <g transform="translate(120,165)">
    <!-- Axes -->
    <line x1="-90" y1="0" x2="90" y2="0" stroke="#999" stroke-width="0.8"/>
    <line x1="0" y1="-90" x2="0" y2="90" stroke="#999" stroke-width="0.8"/>
    <text x="93" y="4" font-size="10" fill="#666">x</text>
    <text x="4" y="-83" font-size="10" fill="#666">y</text>

    <!-- Circle -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#1a5276" stroke-width="1.2" stroke-dasharray="4,3"/>

    <!-- Initial phase arc φ₀ -->
    <path d="M 25 0 A 25 25 0 0 0 21.65 -12.5" fill="none" stroke="#27ae60" stroke-width="1.5"/>
    <text x="30" y="-4" font-size="10" fill="#27ae60">φ₀</text>

    <!-- Full phase arc ωt+φ₀ -->
    <path d="M 40 0 A 40 40 0 0 0 14.0 -37.5" fill="none" stroke="#c0392b" stroke-width="1.5"/>
    <text x="38" y="-25" font-size="10" fill="#c0392b">ωt+φ₀</text>

    <!-- Rotating vector at ~70° -->
    <line x1="0" y1="0" x2="23.94" y2="-65.78" stroke="#1a5276" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
    <text x="6" y="-50" font-size="11" font-weight="bold" fill="#1a5276">A</text>

    <!-- Projection line (dashed vertical) -->
    <line x1="23.94" y1="-65.78" x2="23.94" y2="0" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="4,3"/>

    <!-- Projection on x-axis -->
    <circle cx="23.94" cy="0" r="3" fill="#c0392b"/>
    <text x="18" y="14" font-size="9" fill="#c0392b">x投影</text>

    <!-- Rotating dot -->
    <circle cx="23.94" cy="-65.78" r="3.5" fill="#1a5276"/>

    <!-- ω arrow (circular) -->
    <path d="M 0 -82 A 82 82 0 0 1 30 -76" fill="none" stroke="#8e44ad" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
    <text x="8" y="-85" font-size="10" fill="#8e44ad">ω</text>
  </g>

  <!-- Connection arrow from circle to wave -->
  <line x1="200" y1="165" x2="230" y2="165" stroke="#999" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowGray)"/>

  <!-- === Right: Cosine Waveform === -->
  <g transform="translate(240,165)">
    <!-- Axes -->
    <line x1="0" y1="0" x2="340" y2="0" stroke="#999" stroke-width="0.8" marker-end="url(#arrowGray)"/>
    <line x1="0" y1="-90" x2="0" y2="90" stroke="#999" stroke-width="0.8"/>
    <text x="335" y="15" font-size="10" fill="#666">t</text>
    <text x="5" y="-80" font-size="10" fill="#666">x(t)</text>

    <!-- Amplitude labels -->
    <line x1="-5" y1="-60" x2="5" y2="-60" stroke="#666" stroke-width="0.8"/>
    <text x="-18" y="-56" font-size="10" fill="#1a5276" font-weight="bold">A</text>
    <line x1="-5" y1="60" x2="5" y2="60" stroke="#666" stroke-width="0.8"/>
    <text x="-22" y="64" font-size="10" fill="#1a5276" font-weight="bold">−A</text>

    <!-- Cosine wave: x(t) = A cos(ωt + φ₀), A=60, period~200px, φ₀≈30° -->
    <!-- 1.5 periods = 300px -->
    <path d="M 0,-51.96
      C 8,-58 16,-60 25,-55.98
      C 50,-38 65,-5 75,30
      C 85,55 95,60 100,60
      C 105,60 115,55 125,30
      C 135,5 145,-30 155,-55
      C 160,-60 165,-60 175,-55
      C 185,-38 195,-5 205,30
      C 215,55 225,60 230,60
      C 235,60 245,55 255,30
      C 265,5 275,-30 285,-55
      C 290,-60 295,-60 300,-55"
      fill="none" stroke="#1a5276" stroke-width="2"/>

    <!-- Period bracket T -->
    <line x1="25" y1="75" x2="25" y2="80" stroke="#c0392b" stroke-width="1"/>
    <line x1="225" y1="75" x2="225" y2="80" stroke="#c0392b" stroke-width="1"/>
    <line x1="25" y1="78" x2="225" y2="78" stroke="#c0392b" stroke-width="1" marker-start="url(#arrowRedL)" marker-end="url(#arrowRed)"/>
    <text x="115" y="92" text-anchor="middle" font-size="11" fill="#c0392b">T (周期)</text>

    <!-- Formula -->
    <text x="160" y="-95" text-anchor="middle" font-size="12" fill="#1a5276" font-style="italic">x(t) = A cos(ωt + φ₀)</text>
  </g>

  <!-- Marker definitions -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#1a5276" stroke-width="1.2"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#8e44ad" stroke-width="1.2"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#999" stroke-width="1"/>
    </marker>
    <marker id="arrowRed" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#c0392b"/>
    </marker>
    <marker id="arrowRedL" markerWidth="6" markerHeight="4" refX="0" refY="2" orient="auto">
      <path d="M6,0 L0,2 L6,4" fill="#c0392b"/>
    </marker>
  </defs>
</svg>