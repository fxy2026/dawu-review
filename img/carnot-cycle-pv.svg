<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400" font-family="'SimSun','STSong','Noto Serif CJK SC',serif">
  <defs>
    <marker id="caxX" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#333"/>
    </marker>
    <marker id="caxY" markerWidth="6" markerHeight="8" refX="3" refY="0" orient="auto">
      <path d="M0,8 L3,0 L6,8" fill="#333"/>
    </marker>
  </defs>

  <rect width="500" height="400" fill="#fafafa" rx="6"/>

  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a5276">卡诺循环 p-V 图</text>

  <!-- Axes -->
  <line x1="60" y1="340" x2="470" y2="340" stroke="#333" stroke-width="1.5" marker-end="url(#caxX)"/>
  <line x1="60" y1="340" x2="60" y2="38" stroke="#333" stroke-width="1.5" marker-end="url(#caxY)"/>
  <text x="472" y="356" font-size="14" fill="#333" font-style="italic">V</text>
  <text x="40" y="46" font-size="14" fill="#333" font-style="italic">p</text>
  <text x="48" y="355" font-size="12" fill="#333">O</text>

  <!-- Shaded area (net work) -->
  <path d="M150,100 Q200,108 260,130 Q280,145 300,175 Q320,215 340,250 Q350,265 355,275
           Q310,268 270,250 Q240,235 210,200 Q185,165 160,130 Q152,112 150,100 Z"
        fill="#1a5276" fill-opacity="0.1" stroke="none"/>

  <!-- State points -->
  <!-- 1: top-left (high p, small V) -->
  <!-- 2: top-right (lower p, larger V) on same isotherm T1 -->
  <!-- 3: bottom-right (low p, large V) on isotherm T2 -->
  <!-- 4: bottom-left (medium p, small V) on isotherm T2 -->

  <!-- 1→2: Isothermal expansion at T1 (red curve, top) -->
  <path d="M150,100 Q195,107 240,120 Q275,132 300,175"
        fill="none" stroke="#c0392b" stroke-width="2.5"/>
  <!-- Arrow at midpoint -->
  <polygon points="225,117 217,110 214,120" fill="#c0392b"/>

  <!-- 2→3: Adiabatic expansion (blue curve, right) -->
  <path d="M300,175 Q315,210 335,248 Q345,265 355,275"
        fill="none" stroke="#1a5276" stroke-width="2.5"/>
  <polygon points="340,253 335,243 329,252" fill="#1a5276"/>

  <!-- 3→4: Isothermal compression at T2 (green curve, bottom) -->
  <path d="M355,275 Q310,268 270,252 Q240,238 210,200"
        fill="none" stroke="#27ae60" stroke-width="2.5"/>
  <polygon points="265,250 273,256 270,245" fill="#27ae60"/>

  <!-- 4→1: Adiabatic compression (orange curve, left) -->
  <path d="M210,200 Q190,165 168,135 Q158,118 150,100"
        fill="none" stroke="#e67e22" stroke-width="2.5"/>
  <polygon points="170,138 178,145 173,133" fill="#e67e22"/>

  <!-- State point dots and labels -->
  <circle cx="150" cy="100" r="5" fill="#333"/>
  <text x="132" y="92" font-size="14" font-weight="bold" fill="#333">1</text>

  <circle cx="300" cy="175" r="5" fill="#333"/>
  <text x="308" y="170" font-size="14" font-weight="bold" fill="#333">2</text>

  <circle cx="355" cy="275" r="5" fill="#333"/>
  <text x="362" y="272" font-size="14" font-weight="bold" fill="#333">3</text>

  <circle cx="210" cy="200" r="5" fill="#333"/>
  <text x="192" y="215" font-size="14" font-weight="bold" fill="#333">4</text>

  <!-- Process labels -->
  <text x="175" y="82" font-size="11" fill="#c0392b">等温膨胀 T₁</text>
  <text x="345" y="215" font-size="11" fill="#1a5276">绝热膨胀</text>
  <text x="270" y="295" font-size="11" fill="#27ae60">等温压缩 T₂</text>
  <text x="110" y="170" font-size="11" fill="#e67e22">绝热压缩</text>

  <!-- W label in shaded area -->
  <text x="245" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a5276">W</text>

  <!-- Formulas -->
  <rect x="280" y="330" width="200" height="50" rx="4" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="380" y="350" text-anchor="middle" font-size="13" fill="#333">W = Q₁ − Q₂</text>
  <text x="380" y="370" text-anchor="middle" font-size="13" fill="#c0392b">η = 1 − T₂/T₁</text>
</svg>