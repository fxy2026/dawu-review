<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 400" width="550" height="400" font-family="'SimSun','STSong','Noto Serif CJK SC',serif">
  <defs>
    <marker id="axX" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#333"/>
    </marker>
    <marker id="axY" markerWidth="6" markerHeight="8" refX="3" refY="0" orient="auto">
      <path d="M0,8 L3,0 L6,8" fill="#333"/>
    </marker>
    <marker id="procArrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="context-stroke"/>
    </marker>
  </defs>

  <rect width="550" height="400" fill="#fafafa" rx="6"/>

  <!-- Title -->
  <text x="275" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a5276">p-V图：四种准静态过程</text>

  <!-- Axes -->
  <line x1="80" y1="340" x2="510" y2="340" stroke="#333" stroke-width="1.5" marker-end="url(#axX)"/>
  <line x1="80" y1="340" x2="80" y2="40" stroke="#333" stroke-width="1.5" marker-end="url(#axY)"/>
  <text x="515" y="355" font-size="14" fill="#333" font-style="italic">V</text>
  <text x="55" y="48" font-size="14" fill="#333" font-style="italic">p</text>
  <text x="68" y="355" font-size="12" fill="#333">O</text>

  <!-- Point A -->
  <circle cx="180" cy="110" r="5" fill="#1a5276"/>
  <text x="168" y="98" font-size="15" font-weight="bold" fill="#1a5276">A</text>

  <!-- Dashed lines from A to axes -->
  <line x1="80" y1="110" x2="180" y2="110" stroke="#999" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="180" y1="110" x2="180" y2="340" stroke="#999" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="60" y="115" font-size="11" fill="#666">p₀</text>
  <text x="172" y="358" font-size="11" fill="#666">V₀</text>

  <!-- 1. Isochoric (等容) - vertical down to B - RED -->
  <line x1="180" y1="115" x2="180" y2="250" stroke="#c0392b" stroke-width="2.5" marker-end="url(#procArrow)"/>
  <circle cx="180" cy="255" r="4" fill="#c0392b"/>
  <text x="165" y="272" font-size="13" font-weight="bold" fill="#c0392b">B</text>
  <text x="115" y="195" font-size="12" fill="#c0392b">等容过程</text>

  <!-- 2. Isobaric (等压) - horizontal right to C - GREEN -->
  <line x1="185" y1="110" x2="370" y2="110" stroke="#27ae60" stroke-width="2.5" marker-end="url(#procArrow)"/>
  <circle cx="375" cy="110" r="4" fill="#27ae60"/>
  <text x="380" y="105" font-size="13" font-weight="bold" fill="#27ae60">C</text>
  <text x="250" y="98" font-size="12" fill="#27ae60">等压过程</text>

  <!-- 3. Isothermal (等温) - hyperbola to D - BLUE -->
  <path d="M185,112 Q220,145 260,175 Q300,205 350,225 Q400,240 440,247"
        fill="none" stroke="#1a5276" stroke-width="2.5"/>
  <!-- arrowhead manually -->
  <polygon points="440,247 432,240 430,249" fill="#1a5276"/>
  <circle cx="445" cy="248" r="4" fill="#1a5276"/>
  <text x="450" y="245" font-size="13" font-weight="bold" fill="#1a5276">D</text>
  <text x="355" y="200" font-size="12" fill="#1a5276">等温过程</text>
  <text x="355" y="215" font-size="10" fill="#1a5276">(pV = const)</text>

  <!-- 4. Adiabatic (绝热) - steeper curve to E - ORANGE -->
  <path d="M185,112 Q215,160 245,210 Q275,255 310,285 Q340,305 370,312"
        fill="none" stroke="#e67e22" stroke-width="2.5"/>
  <polygon points="370,312 361,306 360,315" fill="#e67e22"/>
  <circle cx="375" cy="313" r="4" fill="#e67e22"/>
  <text x="380" y="318" font-size="13" font-weight="bold" fill="#e67e22">E</text>
  <text x="225" y="285" font-size="12" fill="#e67e22">绝热过程</text>
  <text x="225" y="300" font-size="10" fill="#e67e22">(pVᵞ = const)</text>

  <!-- Note: adiabatic steeper -->
  <text x="310" y="375" text-anchor="middle" font-size="11" fill="#555">注：绝热线比等温线更陡 (γ &gt; 1)</text>
</svg>